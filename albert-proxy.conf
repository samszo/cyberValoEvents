# Configuration Apache — Reverse proxy vers l'API Albert (Étalab)
# Résout le blocage CORS lorsque le navigateur appelle l'API depuis localhost.
#
# Prérequis : activer les modules Apache suivants
#   sudo a2enmod proxy proxy_http proxy_ssl headers
#   sudo systemctl reload apache2
#
# Intégration : inclure ce fichier dans votre VirtualHost ou dans apache2.conf
#   Include /chemin/vers/cyberValoEvents/albert-proxy.conf
#
# ─────────────────────────────────────────────────────────────────────────────

<IfModule mod_proxy.c>

  SSLProxyEngine On
  ProxyRequests Off

  # Toutes les requêtes vers /proxy/albert/ sont transmises à l'API Albert
  ProxyPass        /proxy/albert/  https://albert.api.etalab.gouv.fr/v1/
  ProxyPassReverse /proxy/albert/  https://albert.api.etalab.gouv.fr/v1/

  # Transmettre les en-têtes d'origine pour que l'API identifie le client
  ProxyPreserveHost Off
  RequestHeader set X-Forwarded-Proto "https"

  # En-têtes CORS ajoutés par Apache sur les réponses du proxy
  <Location /proxy/albert/>
    Header always set Access-Control-Allow-Origin  "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type, Accept"

    # Répondre directement aux requêtes preflight OPTIONS
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^ - [R=204,L]
  </Location>

</IfModule>
